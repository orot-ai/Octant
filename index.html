.card-qr { background: #fff; border: 2.5px solid #1a1a1a; border-radius: 0.35rem; padding: 0.3rem; box-shadow: 3px 3px 0 #1a1a1a; margin-top: 0.6rem; }
.card-qr img { display: block; width: 88px; height: 88px; }
.card-qr-cap { font-size: 0.62rem; font-weight: 900; letter-spacing: 0.15em; margin-top: 0.35rem; }

/* === Rarity badge === */
.rarity-row { display: flex; justify-content: center; margin: 0.3rem 0 1rem; }
.rarity-chip { display: inline-flex; align-items: center; gap: 0.45rem; background: #fff; border: 2.5px solid #1a1a1a; border-radius: 0.4rem; padding: 0.45rem 0.85rem; font-size: 0.85rem; font-weight: 700; box-shadow: 3px 3px 0 #1a1a1a; }
.rarity-chip.legendary { background: #fde047; }
.rarity-chip.rare { background: #c4b5fd; }
.rarity-chip.uncommon { background: #fef9c3; }
.rarity-chip-emoji { font-size: 1.05rem; }
.rarity-chip strong { font-weight: 900; }

/* === Card flip hint button === */
.card-hint-row { display: flex; justify-content: center; gap: 0.5rem; margin: 0.55rem 0 0; flex-wrap: wrap; }
.card-hint-btn { background: #fff; border: 2px solid #1a1a1a; border-radius: 0.3rem; padding: 0.35rem 0.7rem; font-size: 0.72rem; font-weight: 900; letter-spacing: 0.05em; cursor: pointer; font-family: inherit; box-shadow: 2px 2px 0 #1a1a1a; }
.card-hint-btn:hover { background: #fde047; }
.card-hint-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 #1a1a1a; }

/* === Sound toggle === */
.sound-toggle { position: fixed; right: 0.85rem; top: 0.85rem; width: 2.4rem; height: 2.4rem; border-radius: 0.4rem; background: #fff; border: 2.5px solid #1a1a1a; box-shadow: 3px 3px 0 #1a1a1a; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; z-index: 50; padding: 0; font-family: inherit; }
.sound-toggle:hover { background: #fde047; }
.sound-toggle:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #1a1a1a; }

/* === Match page === */
.match-form { background: #fff; border: 3px solid #1a1a1a; border-radius: 0.75rem; box-shadow: 6px 6px 0 #1a1a1a; padding: 1.4rem; margin-bottom: 1.5rem; }
.match-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.match-select { padding: 0.65rem 0.5rem; border: 2.5px solid #1a1a1a; border-radius: 0.4rem; font-size: 0.92rem; font-weight: 700; background: #fff; font-family: inherit; }
.match-select:focus { outline: none; background: #fef9c3; }
.match-result { background: #fff; border: 3px solid #1a1a1a; border-radius: 0.75rem; box-shadow: 6px 6px 0 #1a1a1a; padding: 1.5rem; margin-bottom: 1.25rem; }
.match-head { text-align: center; }
.match-emoji-row { display: flex; align-items: center; justify-content: center; gap: 0.6rem; font-size: 2.6rem; }
.match-x { font-size: 1.4rem; font-weight: 900; }
.match-label { display: inline-block; background: #fde047; padding: 0.35rem 0.85rem; border: 2.5px solid #1a1a1a; border-radius: 0.4rem; font-weight: 900; font-size: 1.05rem; margin: 0.7rem 0 0.5rem; box-shadow: 3px 3px 0 #1a1a1a; }
.match-desc { font-size: 0.95rem; line-height: 1.6; color: #1a1a1a; margin: 0.6rem auto 0; max-width: 520px; font-weight: 500; }
.axis-list { display: flex; flex-direction: column; gap: 0.45rem; margin-top: 1.1rem; }
.axis-cmp { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 0.75rem; border: 2px solid #1a1a1a; border-radius: 0.4rem; font-size: 0.85rem; font-weight: 700; background: #fef9c3; }
.axis-cmp.diff { background: #fff; }
.axis-cmp-mark { width: 1.4rem; height: 1.4rem; border-radius: 0.25rem; background: #1a1a1a; color: #fdf6e3; display: inline-flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.85rem; flex-shrink: 0; }
.axis-cmp.diff .axis-cmp-mark { background: #fff; color: #1a1a1a; border: 2px solid #1a1a1a; }
.axis-cmp-name { flex: 1; }
.axis-cmp-vals { font-size: 0.78rem; font-weight: 800; color: #57534e; }

.stats-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.85rem; margin: 1rem 0 1.5rem; }
.stat-card { background: #fff; border: 3px solid #1a1a1a; border-radius: 0.65rem; padding: 1rem; box-shadow: 5px 5px 0 #1a1a1a; text-align: center; }
.stat-card.gold { background: #fde047; }
.stat-card-num { font-size: 2rem; font-weight: 900; line-height: 1.1; margin: 0.2rem 0; }
.stat-card-num.small { font-size: 1.4rem; }
.stat-card-label { font-size: 0.7rem; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; color: #57534e; }
.stats-bars { display: flex; flex-direction: column; gap: 0.6rem; background: #fff; border: 3px solid #1a1a1a; border-radius: 0.75rem; padding: 1.25rem; box-shadow: 6px 6px 0 #1a1a1a; }
.stats-bar-row { display: grid; grid-template-columns: 2.2rem 5.4rem 1fr 4rem; gap: 0.55rem; align-items: center; font-size: 0.82rem; font-weight: 800; }
.stats-bar-emoji { font-size: 1.3rem; line-height: 1; text-align: center; }
.stats-bar-label { font-weight: 900; }
.stats-bar-track { height: 18px; background: #fdf6e3; border: 2px solid #1a1a1a; border-radius: 0.25rem; overflow: hidden; }
.stats-bar-fill { height: 100%; background: #1a1a1a; transition: width 0.6s; width: 0%; }
.stats-bar-num { text-align: right; font-weight: 900; font-size: 0.78rem; }
.stats-bar-row.self .stats-bar-fill { background: #fde047; box-shadow: inset 0 0 0 2px #1a1a1a; }
.stats-bar-row.self .stats-bar-track { background: #fef9c3; }
.stats-bar-row.self .stats-bar-label::after { content: ' (나)'; font-size: 0.65rem; color: #57534e; }
.axis-list-bottom { margin-top: 1rem; }

/* === Result layout tighten === */
.card-section { gap: 0.55rem; margin: 1.25rem 0 0.5rem; }
.rarity-row { margin: 0.1rem 0 0.5rem; }
.card-hint-row { display: none; }
.actions-row { display: flex; gap: 0.55rem; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 360px; margin: 0.55rem auto 0; padding: 0 0.5rem; }
.actions-row .btn { flex: 1; min-width: 0; padding: 0.7rem 0.5rem; font-size: 0.92rem; }
.share-row { display: none; }
.cta-divider { border-top: 2.5px dashed #1a1a1a; margin: 2.25rem 0 1rem; padding-top: 0.75rem; text-align: center; font-size: 0.72rem; font-weight: 900; letter-spacing: 0.18em; color: #57534e; text-transform: uppercase; }
.cta-row { gap: 0.55rem; }
.cta-row .btn { font-size: 0.85rem; padding: 0.6rem 1rem; }
.boundary-link { font-size: 0.78rem; padding: 0.18rem 0.5rem; }
</style>

tconst ref = useRef(null);\n\tuseEffect(() => { if (ref.current) ref.current.style.width = `${width}%`; }, [width]);\n\treturn (\n\t\t<div className={`stats-bar-row ${isSelf ? 'self' : ''}`}>\n\t\t\t<span className=\"stats-bar-emoji\">{meta.emoji}</span>\n\t\t\t<span className=\"stats-bar-label\">{code}</span>\n\t\t\t<div className=\"stats-bar-track\"><div ref={ref} className=\"stats-bar-fill\" /></div>\n\t\t\t<span className=\"stats-bar-num\">{count} · {pct.toFixed(1)}%</span>\n\t\t</div>\n\t);\n}\n\nfunction StatsPage({ selfCode }) {\n\tconst [stats, setStats] = useState(null);\n\tconst [error, setError] = useState(null);\n\tuseEffect(() => {\n\t\tlet cancelled = false;\n\t\t(async () => {\n\t\t\ttry {\n\t\t\t\tconst counts = {};\n\t\t\t\tTYPE_CODES.forEach(c => { counts[c] = 0; });\n\t\t\t\tlet total = 0;\n\t\t\t\tlet durSum = 0;\n\t\t\t\tlet durN = 0;\n\t\t\t\tlet cursor;\n\t\t\t\tlet hasMore = true;\n\t\t\t\twhile (hasMore) {\n\t\t\t\t\tconst body = cursor ? { start_cursor: cursor } : {};\n\t\t\t\t\tconst res = await queryDatabase(RESPONDENTS_DB_ID, body);\n\t\t\t\t\tfor (const r of (res.results || [])) {\n\t\t\t\t\t\ttotal += 1;\n\t\t\t\t\t\tconst c = pickValue(r.properties['결과코드']);\n\t\t\t\t\t\tif (counts[c] !== undefined) counts[c] += 1;\n\t\t\t\t\t\tconst d = pickValue(r.properties['소요시간(초)']);\n\t\t\t\t\t\tif (typeof d === 'number' && d > 0) { durSum += d; durN += 1; }\n\t\t\t\t\t}\n\t\t\t\t\thasMore = !!res.has_more;\n\t\t\t\t\tcursor = res.next_cursor;\n\t\t\t\t}\n\t\t\t\tif (!cancelled) {\n\t\t\t\t\tconst sorted = TYPE_CODES.slice().sort((a, b) => counts[b] - counts[a]);\n\t\t\t\t\tconst top = sorted[0];\n\t\t\t\t\tconst rare = sorted[sorted.length - 1];\n\t\t\t\t\tconst avgDur = durN ? Math.round(durSum / durN) : 0;\n\t\t\t\t\tsetStats({ counts, total, top, rare, avgDur });\n\t\t\t\t}\n\t\t\t} catch (err) {\n\t\t\t\tconsole.warn('[stats] 실패:', err.message);\n\t\t\t\tif (!cancelled) setError(err.message);\n\t\t\t}\n\t\t})();\n\t\treturn () => { cancelled = true; };\n\t}, []);\n\tif (error) return (\n\t\t<div className=\"page\">\n\t\t\t<h2 className=\"page-title\">전체 분포</h2>\n\t\t\t<p className=\"state-msg error\">불러오기 실패: {error}</p>\n\t\t\t<div className=\"cta-row\"><button className=\"btn btn-primary\" onClick={() => go(ROUTES.HOME)}>처음으로</button></div>\n\t\t</div>\n\t);\n\tif (!stats) return (\n\t\t<div className=\"page\">\n\t\t\t<h2 className=\"page-title\">전체 분포</h2>\n\t\t\t<div className=\"state-msg\">통계 집계 중...</div>\n\t\t</div>\n\t);\n\tconst maxCount = Math.max(1, ...Object.values(stats.counts));\n\tconst topMeta = TYPE_META[stats.top];\n\tconst rareMeta = TYPE_META[stats.rare];\n\treturn (\n\t\t<div className=\"page\">\n\t\t\t<h2 className=\"page-title\">전체 분포</h2>\n\t\t\t<div className=\"stats-summary\">\n\t\t\t\t<div className=\"stat-card gold\">\n\t\t\t\t\t<div className=\"stat-card-label\">누적 응시</div>\n\t\t\t\t\t<div className=\"stat-card-num\">{stats.total.toLocaleString()}</div>\n\t\t\t\t</div>\n\t\t\t\t<div className=\"stat-card\">\n\t\t\t\t\t<div className=\"stat-card-label\">최다 유형</div>\n\t\t\t\t\t<div className=\"stat-card-num small\">{topMeta?.emoji} {stats.top}</div>\n\t\t\t\t</div>\n\t\t\t\t<div className=\"stat-card\">\n\t\t\t\t\t<div className=\"stat-card-label\">최희귀 유형</div>\n\t\t\t\t\t<div className=\"stat-card-num small\">{rareMeta?.emoji} {stats.rare}</div>\n\t\t\t\t</div>\n\t\t\t\t<div className=\"stat-card\">\n\t\t\t\t\t<div className=\"stat-card-label\">평균 소요</div>\n\t\t\t\t\t<div className=\"stat-card-num small\">{stats.avgDur}초</div>\n\t\t\t\t</div>\n\t\t\t</div>\n\t\t\t<div className=\"stats-bars\">\n\t\t\t\t{TYPE_CODES.map(code => {\n\t\t\t\t\tconst meta = TYPE_META[code];\n\t\t\t\t\tconst count = stats.counts[code] || 0;\n\t\t\t\t\tconst pct = stats.total ? (count / stats.total) * 100 : 0;\n\t\t\t\t\tconst w = pct;\n\t\t\t\t\treturn <StatsBarRow key={code} code={code} meta={meta} count={count} pct={pct} width={w} isSelf={selfCode === code} />;\n\t\t\t\t})}\n\t\t\t</div>\n\t\t\t<div className=\"cta-row\"><button className=\"btn btn-ghost\" onClick={backToResultOrHome}>{backLabel()}</button></div>\n\t\t</div>\n\t);\n}\n\n// ===== About =====\nfunction AboutPage() {\n\treturn (\n\t\t<div className=\"page\">\n\t\t\t<h2 className=\"page-title\">검사 소개</h2>\n\t\t\t<section className=\"prose\">\n\t\t\t\t<h3>왜 만들었나</h3>\n\t\t\t\t<p>자기 사고 패턴을 빠르게 파악하기 위한 도구입니다.</p>\n\t\t\t\t<h3>3축 체계</h3>\n\t\t\t\t<ul>\n\t\t\t\t\t<li><strong>T/B</strong> — 사고의 출발점 (하향식 / 상향식)</li>\n\t\t\t\t\t<li><strong>I/O</strong> — 시간 호흡 (즉각 / 관찰)</li>\n\t\t\t\t\t<li><strong>S/C</strong> — 구조 지향 (자기 / 공동체)</li>\n\t\t\t\t</ul>\n\t\t\t\t<h3>결과 해석</h3>\n\t\t\t\t<p>경향성이지 고정이 아닙니다. 시기·맥락에 따라 달라질 수 있어요.</p>\n\t\t\t\t<h3>개인정보 처리</h3>\n\t\t\t\t<p>수집 항목: 이름, 연락처, 응답값. 보관 기간: 1년. 통계 목적으로만 사용합니다.</p>\n\t\t\t</section>\n\t\t\t<div className=\"cta-row\"><button className=\"btn btn-primary\" onClick={() => go(ROUTES.INFO)}>검사 시작하기 →</button></div>\n\t\t</div>\n\t);\n}\n\n// ===== Type detail =====\nfunction TypeDetailPage({ code, types, types7sec, fetchType7Sec }) {\n\tuseEffect(() => { if (code) fetchType7Sec(code); }, [code, fetchType7Sec]);\n\tif (!code || !TYPE_META[code]) {\n\t\treturn (\n\t\t\t<div className=\"page\">\n\t\t\t\t<p className=\"state-msg\">유형 정보 없음</p>\n\t\t\t\t<div className=\"cta-row\"><button className=\"btn btn-primary\" onClick={() => go(ROUTES.TYPES)}>← 8유형 비교로</button></div>\n\t\t\t</div>\n\t\t);\n\t}\n\tconst meta = TYPE_META[code];\n\tconst row = types?.[code];\n\tconst oneLiner = row?.oneLiner || '';\n\tconst evolveHint = row?.evolveHint || '';\n\tconst sections = types7sec[code];\n\treturn (\n\t\t<div className=\"page\">\n\t\t\t<header className=\"detail-head\">\n\t\t\t\t<div className=\"detail-emoji\">{meta.emoji}</div>\n\t\t\t\t<h2 className=\"detail-code\"><strong>{code}</strong> · {meta.animal}</h2>\n\t\t\t\t{oneLiner && <p className=\"detail-oneliner\">{oneLiner}</p>}\n\t\t\t</header>\n\t\t\t<ResultSections sections={sections} />\n\t\t\t{evolveHint && (\n\t\t\t\t<section className=\"prose\">\n\t\t\t\t\t<h3>진화 힌트</h3>\n\t\t\t\t\t<p>→ {evolveHint}</p>\n\t\t\t\t</section>\n\t\t\t)}\n\t\t\t<div className=\"cta-row\">\n\t\t\t\t<button className=\"btn btn-ghost\" onClick={() => go(ROUTES.TYPES)}>← 8유형 비교</button>\n\t\t\t\t{getStoredShareId() && <button className=\"btn btn-ghost\" onClick={backToResultOrHome}>← 내 결과로</button>}\n\t\t\t</div>\n\t\t</div>\n\t);\n}\n\n// ===== Types compare =====\nfunction TypesComparePage({ types, selfCode }) {\n\tconst handleOpen = (code) => go(ROUTES.TYPE, `code=${code}`);\n\tconst handleKey = (e, code) => {\n\t\tif (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleOpen(code); }\n\t};\n\treturn (\n\t\t<div className=\"page\">\n\t\t\t<h2 className=\"page-title\">8유형 비교</h2>\n\t\t\t<p className=\"disclaimer types-hint\">카드를 누르면 상세 본문이 펼쳐져요</p>\n\t\t\t<div className=\"type-grid\">\n\t\t\t\t{TYPE_CODES.map(code => {\n\t\t\t\t\tconst meta = TYPE_META[code];\n\t\t\t\t\tconst row = types?.[code];\n\t\t\t\t\tconst isSelf = selfCode === code;\n\t\t\t\t\treturn (\n\t\t\t\t\t\t<article key={code} className={`type-card ${isSelf ? 'self' : ''}`} onClick={() => handleOpen(code)} onKeyDown={(e) => handleKey(e, code)} role=\"button\" tabIndex={0}>\n\t\t\t\t\t\t\t<span className=\"type-no\">No.{meta.no || '00'}</span>\n\t\t\t\t\t\t\t<div className=\"type-emoji\">{meta.emoji}</div>\n\t\t\t\t\t\t\t<h4 className=\"type-code\">{code} · {meta.animal}</h4>\n\t\t\t\t\t\t\t<p className=\"type-oneliner\">{row?.oneLiner || ''}</p>\n\t\t\t\t\t\t</article>\n\t\t\t\t\t);\n\t\t\t\t})}\n\t\t\t</div>\n\t\t\t<div className=\"cta-row\"><button className=\"btn btn-ghost\" onClick={backToResultOrHome}>{backLabel()}</button></div>\n\t\t</div>\n\t);\n}\n\n// ===== Respondents 속성 빌더 =====\nfunction buildRespondentProperties({ info, payload, typeName }) {\n\tconst rt = (s) => ({ rich_text: [{ text: { content: String(s ?? '') } }] });\n\tconst num = (n) => ({ number: typeof n === 'number' ? n : null });\n\tconst props
